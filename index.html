<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caruso – Contacts Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Text:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: #f9fafb; color: #0a0a0a; min-height: 100vh; }
    .topbar { background: #112c37; height: 60px; display: flex; align-items: center; padding: 0 24px; color: #fff; }
    .topbar-logo { font-weight: 600; font-size: 14px; margin-right: auto; }
    .sidebar { width: 220px; background: #112c37; color: #fff; padding: 20px; position: fixed; height: 100vh; overflow-y: auto; }
    .main { margin-left: 220px; display: flex; flex-direction: column; min-height: 100vh; }
    .content { padding: 24px; flex: 1; }
    .header { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subheader { font-size: 14px; color: #8c95a6; margin-bottom: 20px; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .btn { background: #7f6df1; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #6f5dd1; }
    .btn-secondary { background: #fff; color: #0a0a0a; border: 1px solid #d8dae5; }
    .btn-secondary:hover { background: #f9fafb; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e6e8f0; }
    th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #8c95a6; }
    td { padding: 16px; border-top: 1px solid #f0f2f5; }
    .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag.prospect { background: #fef3e8; color: #c07514; }
    .tag.investor { background: #e3f0fb; color: #1a6ea8; }
    .tag.adviser { background: #e7f5ee; color: #2e7d57; }
    .tag.key-contact { background: #ede9fd; color: #7f6df1; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">Caruso</div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div style="font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 12px;">Menu</div>
      <div style="font-size: 13px; margin-bottom: 12px; cursor: pointer;">Contacts</div>
      <div style="font-size: 13px; margin-bottom: 12px; cursor: pointer;">Settings</div>
    </div>
    <div class="content">
      <h1 class="header">Bulk Tagging</h1>
      <p class="subheader">Bulk apply tags to multiple contacts</p>
      <div class="toolbar">
        <button class="btn">+ Add Tag</button>
        <button class="btn-secondary">Export</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Tags</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Alice Johnson</td>
            <td>alice@example.com</td>
            <td><span class="tag investor">Investor</span></td>
          </tr>
          <tr>
            <td>Bob Smith</td>
            <td>bob@example.com</td>
            <td><span class="tag prospect">Prospect</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
