<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caruso – Bulk Tagging</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, 'SF Pro Text', sans-serif;
      background: #112c37;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOP BAR ─────────────────────────────────────── */
    .topbar { background:#112c37; height:60px; display:flex; align-items:center; padding:0 24px 0 0; flex-shrink:0; }
    .topbar-logo-area { width:220px; height:60px; background:#112c37; display:flex; align-items:center; padding:10px 10px 10px 16px; gap:12px; flex-shrink:0; }
    .topbar-search { background:rgba(104,122,144,0.6); border-radius:6px; height:36px; width:380px; display:flex; align-items:center; gap:8px; padding:0 12px; cursor:pointer; }
    .topbar-search svg { flex-shrink:0; opacity:0.8; }
    .topbar-search span { font-size:14px; color:rgba(255,255,255,0.75); }
    .topbar-btn { margin-left:10px; border:1px solid rgba(255,255,255,0.7); border-radius:6px; height:36px; padding:0 14px; display:flex; align-items:center; gap:6px; cursor:pointer; background:transparent; color:#fff; font-size:14px; font-weight:700; white-space:nowrap; }
    .topbar-btn:hover { background:rgba(255,255,255,0.1); }
    .topbar-spacer { flex:1; margin-left:10px; }
    .topbar-account { display:flex; align-items:center; gap:16px; }
    .topbar-tenant { border:1px solid rgba(255,255,255,0.7); border-radius:6px; height:36px; padding:0 14px; color:#fff; font-size:14px; font-weight:500; display:flex; align-items:center; }
    .topbar-divider { width:1px; height:32px; background:rgba(255,255,255,0.3); }
    .avatar { width:36px; height:36px; border-radius:50%; background:#dcf2ea; color:#317159; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; }

    /* ─── LAYOUT ──────────────────────────────────────── */
    .layout { display:flex; flex:1; min-height:0; }
    .sidebar { width:220px; background:#112c37; flex-shrink:0; padding:12px 10px; display:flex; flex-direction:column; overflow-y:auto; min-height:calc(100vh - 60px); }
    .nav-section-label { display:flex; align-items:center; gap:5px; height:36px; padding:0 10px; margin-top:6px; }
    .nav-section-label span { font-size:11px; font-weight:600; color:#d2cbff; text-transform:uppercase; letter-spacing:0.5px; }
    .nav-item { display:flex; align-items:center; height:36px; padding:0 10px; border-radius:5px; cursor:pointer; font-size:14px; font-weight:500; color:rgba(255,255,255,0.85); white-space:nowrap; position:relative; transition:background 0.15s; }
    .nav-item:hover { background:rgba(255,255,255,0.08); }
    .nav-item.active { background:#7f6df1; color:#fff; }
    .nav-badge { position:absolute; right:10px; background:#dcf2ea; color:#317159; font-size:11px; font-weight:600; border-radius:8px; padding:1px 6px; }

    /* ─── MAIN ────────────────────────────────────────── */
    .main { flex:1; background:#fff; display:flex; flex-direction:column; min-width:0; border-radius:4px 0 0 0; overflow:hidden; position:relative; }
    .page-header { height:46px; border-bottom:1px solid #e6e8f0; display:flex; align-items:center; padding:0 24px; }
    .breadcrumb { font-size:13px; color:#425a70; display:flex; align-items:center; gap:6px; }
    .breadcrumb .current { font-weight:600; color:#7f6df1; }
    .toolbar { height:56px; border-bottom:1px solid #e6e8f0; display:flex; align-items:center; padding:0 24px; gap:12px; }
    .search-box { border:1px solid #e0e4ea; border-radius:6px; height:34px; width:220px; display:flex; align-items:center; gap:8px; padding:0 10px; background:#fafafa; }
    .search-box input { border:none; background:transparent; font-size:13px; color:#425a70; outline:none; width:100%; font-family:inherit; }
    .search-box input::placeholder { color:#aab2bd; }
    .filter-btn { border:1px solid #d8dae5; border-radius:8px; height:36px; padding:0 16px; font-size:13px; color:#474d66; background:#fff; cursor:pointer; font-family:inherit; }
    .filter-btn:hover { background:#f8f9fb; }
    .toolbar-spacer { flex:1; }
    .create-btn { background:#7f6df1; color:#fff; border:none; border-radius:6px; height:34px; padding:0 14px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; font-family:inherit; }

    /* ─── TABLE ───────────────────────────────────────── */
    .table-wrap { flex:1; overflow:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { text-align:left; padding:10px 16px; font-size:11px; font-weight:600; color:#8c95a6; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; position:sticky; top:0; background:#f9fafb; z-index:1; border-bottom:1px solid #e6e8f0; }
    tbody tr { border-bottom:1px solid #f0f2f5; cursor:pointer; transition:background 0.08s; }
    tbody tr:hover { background:#f8f9fb; }
    tbody td { padding:11px 16px; color:#0a0a0a; font-size:13px; white-space:nowrap; vertical-align:middle; }
    .col-check { width:40px; text-align:center; }
    .col-check input[type="checkbox"] { width:16px; height:16px; accent-color:#7f6df1; cursor:pointer; }
    thead th.col-check { position:sticky; left:0; z-index:3; }
    tbody td.col-check { position:sticky; left:0; z-index:1; background:#fff; }
    tbody tr:hover td.col-check { background:#f8f9fb; }
    tbody tr.selected td { background:#f5f3ff; }
    tbody tr.selected td.col-check { background:#f5f3ff; }
    .col-id { width:70px; }
    .badge { display:inline-flex; align-items:center; height:24px; border-radius:4px; font-size:11px; font-weight:600; padding:0 8px; letter-spacing:0.3px; text-transform:uppercase; }
    .badge-account { background:#e3f0fb; color:#1a6ea8; }
    .badge-prospect { background:#fef3e8; color:#c07514; }
    .badge-individual { background:#e3f0fb; color:#1a6ea8; }
    .badge-company { background:#e7f5ee; color:#2e7d57; }
    .badge-trust { background:#fef3e8; color:#c07514; }
    .badge-partnership { background:#fdf2f2; color:#c0392b; }
    .badge-joint { background:#ede9fd; color:#7f6df1; }
    .tasks-btn { display:inline-flex; align-items:center; gap:8px; height:28px; padding:0 10px; background:#fff; border:1px solid #d8dae5; border-radius:4px; font-size:12px; font-weight:500; color:#0a0a0a; cursor:pointer; font-family:inherit; }
    .tasks-btn .task-count { background:#d6e0ff; color:#2952cc; font-size:11px; font-weight:600; border-radius:8px; padding:1px 6px; }
    .add-cell { width:48px; text-align:center; position:sticky; right:0; background:#fff; z-index:1; }
    .add-cell::before, thead th:last-child::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background:#e6e8f0; }
    thead th:last-child { position:sticky; right:0; background:#f9fafb; z-index:2; }
    .add-btn { width:32px; height:32px; border-radius:6px; border:1px solid #e0e4ea; background:#fff; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    .add-btn:hover { background:#f0f2f5; }
    .pagination { height:60px; border-top:1px solid #e6e8f0; display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0; }
    .pagination .results-label { font-size:12px; color:#425a70; }

    /* ─── TAG BADGES (Option F style) ─────────────────── */
    .tag-wrap { display:flex; flex-wrap:nowrap; gap:5px; align-items:center; }
    .tag { display:inline-flex; align-items:center; height:24px; border-radius:4px; font-size:11px; font-weight:600; padding:0 8px; white-space:nowrap; text-transform:uppercase; }
    .tag-counter { display:inline-flex; align-items:center; justify-content:center; height:24px; min-width:28px; border-radius:4px; font-size:11px; font-weight:600; padding:0 6px; background:#eef0f3; color:#4b5563; cursor:pointer; white-space:nowrap; user-select:none; }
    .tag-counter:hover { background:#e2e5ea; }

    /* Tag popover (on +N click) */
    .tag-popover-inline { position:absolute; z-index:80; background:#fff; border:1px solid #e6e8f0; border-radius:8px; padding:8px; box-shadow:0 8px 24px rgba(0,0,0,0.14); display:flex; flex-wrap:wrap; gap:5px; max-width:300px; }

    /* ─── STICKY ACTION BAR ──────────────────────────── */
    .action-bar {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: #112c37;
      border-radius: 8px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
      box-shadow: 0 4px 7px rgba(15,23,42,0.2);
      transition: opacity 0.2s, transform 0.2s;
    }
    .action-bar.hidden { opacity:0; pointer-events:none; transform:translateX(-50%) translateY(12px); }
    .action-bar-count { color:#fff; font-size:12px; font-weight:600; white-space:nowrap; }
    .action-bar-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); }
    .action-bar-btn { background:transparent; border:1px solid #fff; border-radius:4px; height:32px; padding:0 16px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; font-family:inherit; white-space:nowrap; }
    .action-bar-btn:hover { background:rgba(255,255,255,0.1); }
    .action-bar-btn.primary { background:#7f6df1; border-color:#7f6df1; }
    .action-bar-btn.primary:hover { background:#6c5be0; }

    /* ─── ACTIONS DROPDOWN (pops UP) ────────────────── */
    .actions-dropdown-anchor { position:relative; display:inline-block; }
    .actions-dropdown {
      position:absolute; bottom:calc(100% + 8px); left:0;
      width:240px; background:#fff; border:1px solid #e6e8f0; border-radius:8px;
      box-shadow:0 8px 24px rgba(0,0,0,0.16), 0 2px 6px rgba(0,0,0,0.06);
      overflow:hidden; z-index:60;
    }
    .actions-dropdown-item {
      display:flex; align-items:center; gap:10px; height:40px; padding:0 14px;
      cursor:pointer; font-size:13px; color:#0a0a0a; transition:background 0.08s;
    }
    .actions-dropdown-item:hover { background:#f5f3ff; }
    .actions-dropdown-item:not(:last-child) { border-bottom:1px solid #f0f2f5; }
    .actions-dropdown-item svg { flex-shrink:0; }

    /* ─── TAG PICKER (compact multi-select) ────────── */
    .tag-picker-backdrop { position:fixed; inset:0; z-index:90; }
    .tag-picker-anchor {
      position:absolute; bottom:118px; left:50%; transform:translateX(-50%); z-index:100;
    }
    .tag-picker {
      width:300px; background:#fff; border:1px solid #e6e8f0; border-radius:10px;
      box-shadow:0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
      overflow:hidden; display:flex; flex-direction:column;
    }
    .tp-header { display:flex; align-items:center; height:40px; padding:0 12px; gap:8px; border-bottom:1px solid #e6e8f0; background:#fafbfc; }
    .tp-header-title { font-size:13px; font-weight:600; color:#0a0a0a; flex:1; }
    .tp-header-count { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:#ede9fd; color:#7f6df1; }
    .tp-search { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid #f0f2f5; }
    .tp-search input { border:none; background:transparent; font-size:13px; color:#0a0a0a; outline:none; width:100%; font-family:inherit; direction:ltr; text-align:left; }
    .tp-search input::placeholder { color:#aab2bd; }
    .tp-list { max-height:280px; overflow-y:auto; padding:4px 0; }
    .tp-item { display:flex; align-items:center; height:34px; padding:0 12px; gap:10px; cursor:pointer; transition:background 0.08s; user-select:none; }
    .tp-item:hover { background:#f5f3ff; }
    .tp-check { width:16px; height:16px; border-radius:3px; border:1.5px solid #d8dae5; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.1s; }
    .tp-check.on { background:#7f6df1; border-color:#7f6df1; }
    .tp-check.on::after { content:''; width:8px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg); margin-top:-2px; }
    .tp-check.mixed { background:#fff; border-color:#7f6df1; }
    .tp-check.mixed::after { content:''; width:8px; height:0; border-bottom:2px solid #7f6df1; }
    .tp-tag-badge { display:inline-flex; align-items:center; height:22px; border-radius:4px; font-size:11px; font-weight:600; padding:0 8px; text-transform:uppercase; white-space:nowrap; }

    /* Create tag */
    .tp-create { display:flex; align-items:center; height:34px; padding:0 12px; gap:8px; cursor:pointer; color:#7f6df1; font-size:13px; font-weight:500; border-top:1px solid #f0f2f5; }
    .tp-create:hover { background:#f5f3ff; }
    .tp-create-icon { font-size:14px; font-weight:700; color:#7f6df1; }

    /* Colour selection screen (Step 2) */
    .tp-colour-screen { display:flex; flex-direction:column; }
    .tp-colour-header { display:flex; align-items:center; gap:8px; height:40px; padding:0 12px; border-bottom:1px solid #e6e8f0; background:#fafbfc; }
    .tp-colour-back { background:none; border:none; cursor:pointer; font-size:16px; color:#474d66; padding:0; display:flex; align-items:center; }
    .tp-colour-back:hover { color:#0a0a0a; }
    .tp-colour-title { font-size:13px; font-weight:600; color:#0a0a0a; }
    .tp-colour-subtitle { font-size:12px; color:#8c95a6; padding:10px 12px 6px; }
    .tp-colour-list { padding:0 4px 4px; }
    .tp-colour-item { display:flex; align-items:center; height:36px; padding:0 12px; gap:10px; cursor:pointer; border-radius:6px; transition:background 0.08s; }
    .tp-colour-item:hover { background:#f5f3ff; }
    .tp-created-label { font-size:12px; color:#8c95a6; font-weight:400; margin-left:auto; }

    /* Detail page */
    .detail-header { padding:24px 24px 0; }
    .detail-identity { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
    .detail-avatar { width:40px; height:40px; border-radius:50%; background:#ede9fd; color:#7f6df1; font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .detail-name { font-size:16px; font-weight:600; color:#0a0a0a; }
    .detail-id { font-size:12px; color:#8c95a6; }
    .detail-actions { display:flex; gap:8px; margin-left:auto; }
    .detail-action-btn { height:32px; padding:0 14px; border:1px solid #d8dae5; border-radius:6px; background:#fff; font-size:13px; color:#0a0a0a; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
    .detail-action-btn:hover { background:#f8f9fb; }
    .detail-action-btn.plus { background:#7f6df1; color:#fff; border:none; width:32px; height:32px; padding:0; justify-content:center; border-radius:50%; font-size:18px; font-weight:300; }
    .detail-fields { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:0 32px; padding:0 0 16px; border-bottom:1px solid #e6e8f0; }
    .detail-field { padding:8px 0; }
    .detail-field-label { font-size:11px; font-weight:600; color:#8c95a6; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .detail-field-value { font-size:13px; color:#0a0a0a; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .detail-field-value a { color:#7f6df1; text-decoration:none; }
    .detail-field-value .add-tag-link { color:#8c95a6; cursor:pointer; font-size:13px; }
    .detail-field-value .add-tag-link:hover { color:#7f6df1; }
    .detail-tabs { display:flex; gap:0; border-bottom:1px solid #e6e8f0; padding:0 24px; }
    .detail-tab { height:40px; padding:0 16px; font-size:13px; color:#8c95a6; display:flex; align-items:center; cursor:pointer; border-bottom:2px solid transparent; font-weight:500; }
    .detail-tab:hover { color:#0a0a0a; }
    .detail-tab.active { color:#7f6df1; border-bottom-color:#7f6df1; font-weight:600; }
    .detail-body { padding:24px; flex:1; overflow:auto; }
    .detail-section-title { font-size:14px; font-weight:600; color:#0a0a0a; margin-bottom:16px; }
    .detail-form-row { display:flex; gap:24px; margin-bottom:16px; }
    .detail-form-group { flex:1; }
    .detail-form-label { font-size:12px; font-weight:500; color:#8c95a6; margin-bottom:6px; }
    .detail-form-input { width:100%; height:36px; border:1px solid #d8dae5; border-radius:6px; padding:0 12px; font-size:13px; font-family:inherit; color:#0a0a0a; background:#fff; }
    .detail-form-select { width:100%; height:36px; border:1px solid #d8dae5; border-radius:6px; padding:0 12px; font-size:13px; font-family:inherit; color:#8c95a6; background:#fff; appearance:auto; }
    .detail-save-btn { background:#7f6df1; color:#fff; border:none; border-radius:6px; height:32px; padding:0 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; opacity:0.5; }
    .portal-badge { display:inline-flex; align-items:center; height:22px; border-radius:4px; font-size:11px; font-weight:600; padding:0 8px; background:#fde8e8; color:#b91c1c; }
    /* Detail page tag picker positioning */
    .detail-tag-picker-wrap { position:relative; display:inline-block; }
    .detail-tag-picker-anchor { position:absolute; top:100%; left:0; margin-top:4px; z-index:100; }

    /* No confirmation needed — checkbox state change is sufficient feedback */

    /* page-switch indicator */
    .page-switch-label {
      position:fixed; bottom:16px; right:16px; background:#1e293b; color:#fff;
      font-size:11px; padding:6px 12px; border-radius:6px; z-index:200;
      opacity:0; transition:opacity 0.3s; pointer-events:none;
    }
    .page-switch-label.show { opacity:1; }

    /* ─── UNDO TOAST ────────────────────────────────── */
    .undo-toast {
      position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-12px);
      background:#e6f7ed; color:#1a7a42; font-size:13px; font-weight:500;
      padding:12px 20px; border-radius:8px; z-index:200;
      display:flex; align-items:center; gap:10px;
      border:1px solid #b4e6c8;
      opacity:0; pointer-events:none;
      transition:opacity 0.25s, transform 0.25s;
    }
    .undo-toast.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .undo-toast-icon { width:20px; height:20px; border-radius:50%; background:#34a853; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .undo-toast-icon svg { width:12px; height:12px; }
    .undo-toast-msg { white-space:nowrap; }
    .undo-toast-btn { background:none; border:none; color:#1a7a42; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; padding:0; text-decoration:underline; text-underline-offset:2px; }
    .undo-toast-btn:hover { color:#145f32; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#d0d5dd; border-radius:99px; }
  </style>
</head>
<body>

<!-- TOP BAR -->

function getTagStyle(name) {
  return tagStyles[name] || { bg:'#eef0f3', text:'#4b5563' };
}

function renderTagBadge(name, height) {
  const s = getTagStyle(name);
  const h = height || 24;
  return `<span class="tag" style="background:${s.bg}; color:${s.text}; height:${h}px">${escHtml(name)}</span>`;
}

// Render tags in table cells — Option F: 2 visible + clickable +N
function renderTagCell(tags, rowIdx) {
  if (!tags || tags.length === 0) return '<span style="color:#8c95a6">-</span>';
  const maxVisible = 2;
  const visible = tags.slice(0, maxVisible);
  const extra = tags.length - maxVisible;
  let html = '<div class="tag-wrap">';
  html += visible.map(t => renderTagBadge(t)).join('');
  if (extra > 0) {
    html += `<span class="tag-counter" onclick="event.stopPropagation(); toggleInlinePopover(${rowIdx})">+${extra}</span>`;
  }
  html += '</div>';
  return html;
}

// Get tag states across selected rows: 'all', 'some', or 'none'
function getTagStates() {
  const data = getData();
  const selected = data.filter(r => r.sel);
  if (selected.length === 0) return {};
  const states = {};
  getTags().forEach(tag => {
    const count = selected.filter(r => r.tags.includes(tag)).length;
    if (count === 0) states[tag] = 'none';
    else if (count === selected.length) states[tag] = 'all';
    else states[tag] = 'some';
  });
  return states;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    } else {
      rows += `<tr class="${sel}" onclick="onRowClick(${i}, event)"><td class="col-check"><input type="checkbox"${chk} onclick="event.stopPropagation(); toggleRow(${i})"></td><td class="col-id">${r.id}</td><td>${r.d}</td><td>${r.n}</td><td><span class="badge ${bc(r.t)}">${r.t}</span></td><td><button class="tasks-btn" onclick="event.stopPropagation()">View <span class="task-count">${r.tk}</span></button></td><td>${r.cc}</td><td>${r.pv}</td><td>${r.ka}</td><td><button class="tasks-btn" onclick="event.stopPropagation()">View <span class="task-count">${r.h}</span></button></td><td style="position:relative">${renderTagCell(r.tags, i)}</td><td style="color:#8c95a6">-</td><td class="add-cell"><button class="add-btn" onclick="event.stopPropagation()">${sparkle()}</button></td></tr>`;

  });

  const toolbar = isA
    ? `<button class="filter-btn">Status</button><button class="filter-btn">Tags</button><div class="toolbar-spacer"></div><button class="create-btn">+ Create contact</button>`
    : `<button class="filter-btn">Type</button><button class="filter-btn">Risk profile</button><button class="filter-btn">Tags</button><div class="toolbar-spacer"></div>`;

  let html = `
    <div class="page-header"><nav class="breadcrumb"><span>CRM</span><span>›</span><span class="current">${pageLabel}</span></nav></div>
    <div class="toolbar"><div class="search-box">${searchIcon()}<input type="text" placeholder="Search"></div>${toolbar}</div>
    <div class="table-wrap"><table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="pagination"><span class="results-label">Showing 1–${data.length} of ${isA ? 42 : 64}</span></div>
    <div class="action-bar${sc === 0 ? ' hidden' : ''}" id="actionBar">
      <span class="action-bar-count">${sc} selected</span>
      <button class="action-bar-btn" onclick="clearSelection()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M9 3L3 9M3 3l6 6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg> Clear all</button>
      <button class="action-bar-btn" onclick="selectAll()">Select all (${data.length})</button>
      <div class="action-bar-divider"></div>
      <div class="actions-dropdown-anchor">
        <button class="action-bar-btn primary" onclick="toggleActions(event)">Actions ${chevDown()}</button>
        ${actionsOpen ? renderActionsDropdown() : ''}
      </div>
    </div>`;

  // Tag picker overlay
  if (tagPickerOpen) {
    html += `<div class="tag-picker-backdrop" onclick="closeTagPicker()"></div>`;
    html += `<div class="tag-picker-anchor">${renderTagPicker('bulk')}</div>`;
  }

  document.getElementById('main-content').innerHTML = html;

  // Sync select-all checkbox
  const sa = document.getElementById('selectAll');
  if (sa) {
    const allSel = data.every(r => r.sel);
    const someSel = data.some(r => r.sel);
    sa.checked = allSel;
    sa.indeterminate = someSel && !allSel;
  }

  // Focus search if picker open
  if (tagPickerOpen) {
    setTimeout(() => { const inp = document.getElementById('tpSearchInput'); if (inp) inp.focus(); }, 30);
  }
}

// ─── ACTIONS DROPDOWN ──────────────────────────────
function renderActionsDropdown() {
  const tagSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#474d66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>';
  return `<div class="actions-dropdown">
    <div class="actions-dropdown-item" onclick="openTagPicker(event)">${tagSvg} Change or add tags</div>
  </div>`;
}

// ─── TAG PICKER ────────────────────────────────────
function renderTagPicker(context) {
  // context: 'bulk' (default) or 'detail'
  const isBulk = context !== 'detail';
  const sc = isBulk ? selCount() : 0;

  // Colour selection screen (Step 2)
  if (tpScreen === 'colour') {
    const colourItems = NAMED_COLOURS.map(c => {
      const s = { bg: c.bg, text: c.text };
      return `<div class="tp-colour-item" onclick="confirmCreate('${c.name}')">
        <span class="tp-tag-badge" style="background:${s.bg}; color:${s.text}">${escHtml(createName)}</span>
      </div>`;
    }).join('');
    return `<div class="tag-picker tp-colour-screen">
      <div class="tp-colour-header">
        <button class="tp-colour-back" onclick="tpScreen='list'; renderAll();">‹</button>
        <span class="tp-colour-title">New "${escHtml(createName)}" tag</span>
      </div>
      <div class="tp-colour-subtitle">Select a colour...</div>
      <div class="tp-colour-list">${colourItems}</div>
    </div>`;
  }

  // Main tag list screen
  const states = isBulk ? getTagStates() : {};
  const query = tpSearch.toLowerCase();
  const allTags = isBulk ? getTags() : ACCT_TAGS; // detail page always uses account tags
  const filtered = allTags.filter(t => t.toLowerCase().includes(query));
  const showCreateOption = query.length > 0 && !allTags.find(t => t.toLowerCase() === query);

  // Sort: checked tags alphabetically at top, unchecked alphabetically below
  // Exception: justCreatedTag goes to very top
  const sortedTags = [...filtered].sort((a, b) => {
    if (isBulk) {
      const stA = states[a] || 'none';
      const stB = states[b] || 'none';
      const checkedA = stA === 'all' || stA === 'some';
      const checkedB = stB === 'all' || stB === 'some';
      if (a === justCreatedTag) return -1;
      if (b === justCreatedTag) return 1;
      if (checkedA && !checkedB) return -1;
      if (!checkedA && checkedB) return 1;
    } else {
      // Detail: contact tags
      const hasA = detailContact && detailContact.tags.includes(a);
      const hasB = detailContact && detailContact.tags.includes(b);
      if (a === justCreatedTag) return -1;
      if (b === justCreatedTag) return 1;
      if (hasA && !hasB) return -1;
      if (!hasA && hasB) return 1;
    }
    return a.localeCompare(b);
  });

  let items = '';
  sortedTags.forEach(tag => {
    let checkCls = '';
    if (isBulk) {
      const state = states[tag] || 'none';
      checkCls = state === 'all' ? 'on' : state === 'some' ? 'mixed' : '';
    } else {
      const has = detailContact && detailContact.tags.includes(tag);
      checkCls = has ? 'on' : '';
    }
    const s = getTagStyle(tag);
    const createdLabel = tag === justCreatedTag ? '<span class="tp-created-label">Created &amp; added</span>' : '';
    const safeName = tag.replace(/'/g,"&#39;");
    const onclickFn = isBulk ? `toggleTag('${safeName}')` : `toggleDetailTag('${safeName}')`;
    items += `<div class="tp-item" onclick="${onclickFn}">
      <div class="tp-check ${checkCls}"></div>
      <span class="tp-tag-badge" style="background:${s.bg}; color:${s.text}">${escHtml(tag)}</span>
      ${createdLabel}
    </div>`;
  });

  const createRow = showCreateOption
    ? `<div class="tp-create" onclick="startCreate()"><span class="tp-create-icon">+</span> Create "${escHtml(tpSearch)}" tag</div>`
    : '';

  return `<div class="tag-picker">
    <div class="tp-header">
      <span class="tp-header-title">Tags</span>
    </div>
    <div class="tp-search">${searchIcon()}<input type="text" id="tpSearchInput" placeholder="Search or create tag..." value="${escHtml(tpSearch)}" oninput="tpSearch=this.value; updatePickerList('${context || 'bulk'}');"></div>
    <div class="tp-list">${items.length > 0 ? items : (showCreateOption ? '' : '<div style="padding:12px;color:#8c95a6;font-size:13px;text-align:center">No tags found</div>')}</div>
    ${createRow}
  </div>`;
}

// ─── UPDATE PICKER LIST (without destroying the input) ──
function updatePickerList(context) {
  justCreatedTag = null; // clear "Created & added" when user searches
  // Re-render picker content area only
  const pickerEl = document.querySelector('.tag-picker');
  if (!pickerEl) return;
  // Easiest: re-render picker entirely but keep search focus
  const searchVal = tpSearch;
  const anchor = pickerEl.parentNode;
  if (anchor) {
    anchor.innerHTML = renderTagPicker(context);
    const inp = document.getElementById('tpSearchInput');
    if (inp) { inp.focus(); inp.value = searchVal; inp.setSelectionRange(searchVal.length, searchVal.length); }
  }
}

// ─── ROW ACTIONS ───────────────────────────────────
function onRowClick(idx, event) {
  // Ignore clicks on buttons, tag counters, or the checkbox cell
  if (event.target.tagName === 'BUTTON' || event.target.closest('button') || event.target.classList.contains('tag-counter')) return;
  if (event.target.tagName === 'INPUT' || event.target.closest('.col-check')) return;
  // Navigate to detail page
  if (currentPage === 'acct') {
    openDetail(idx);
  }
}
function toggleRow(idx) {
  const data = getData();
  data[idx].sel = !data[idx].sel;
  if (selCount() === 0) closeAll();
  renderMain();
}

function toggleAll(checked) {
  getData().forEach(r => r.sel = checked);
  if (!checked) closeAll();
  renderMain();
}

function clearSelection() {
  getData().forEach(r => r.sel = false);
  closeAll();
  renderMain();
}
function selectAll() {
  getData().forEach(r => r.sel = true);
  renderMain();
}

// ─── ACTIONS DROPDOWN ──────────────────────────────
function toggleActions(e) {
  e.stopPropagation();
  if (tagPickerOpen) return; // don't toggle if picker is open
  actionsOpen = !actionsOpen;
  renderMain();
}

// ─── TAG PICKER ACTIONS ────────────────────────────
function openTagPicker(e) {
  e.stopPropagation();
  actionsOpen = false;
  tagPickerOpen = true;
  tpSearch = '';
  tpScreen = 'list';
  justCreatedTag = null;
  changeCount = 0;

  // Snapshot current tags for undo
  const data = getData();
  const tagsBefore = new Map();
  data.forEach((r, i) => { if (r.sel) tagsBefore.set(i, [...r.tags]); });
  undoSnapshot = { page: currentPage, tagsBefore };

  renderMain();
}

function closeTagPicker() {
  tagPickerOpen = false;
  tpSearch = '';
  tpScreen = 'list';
  justCreatedTag = null;
  renderMain();

  // Show undo toast if changes were made
  if (changeCount > 0 && undoSnapshot) {
    const sc = undoSnapshot.tagsBefore.size;
    const label = currentPage === 'acct'
      ? (sc === 1 ? 'contact' : 'contacts')
      : (sc === 1 ? 'entity' : 'entities');
    showUndoToast(`Successfully updated tags on ${sc} ${label}.`);
  }
}

function toggleTag(tagName) {
  const data = getData();
  const selected = data.filter(r => r.sel);
  if (selected.length === 0) return;

  // Determine current state
  const count = selected.filter(r => r.tags.includes(tagName)).length;
  const state = count === 0 ? 'none' : count === selected.length ? 'all' : 'some';

  // Toggle logic:
  // none → add to all (check)
  // some → add to all (check — complete the partial)
  // all → remove from all (uncheck)
  if (state === 'all') {
    selected.forEach(r => { r.tags = r.tags.filter(t => t !== tagName); });
  } else {
    selected.forEach(r => { if (!r.tags.includes(tagName)) r.tags.push(tagName); });
  }

  changeCount++;
  renderMain();
}

// ─── TAG CREATION (2-step: type name → pick colour) ──
function startCreate() {
  createName = tpSearch;
  tpScreen = 'colour'; // navigate to colour selection screen
  renderAll();
}

function confirmCreate(colourName) {
  if (!createName.trim()) return;
  const name = createName.trim();
  const colour = NAMED_COLOURS.find(c => c.name === colourName) || NAMED_COLOURS[0];
  tagStyles[name] = { bg: colour.bg, text: colour.text };

  // Add to appropriate tag list
  if (currentPage === 'detail' || currentPage === 'acct') {
    ACCT_TAGS.push(name);
  } else {
    IE_TAGS.push(name);
  }

  // Auto-add to selected rows (bulk) or contact (detail)
  if (currentPage === 'detail' && detailContact) {
    if (!detailContact.tags.includes(name)) detailContact.tags.push(name);
  } else {
    const data = getData();
    data.filter(r => r.sel).forEach(r => {
      if (!r.tags.includes(name)) r.tags.push(name);
    });
  }

  justCreatedTag = name;
  tpScreen = 'list';
  tpSearch = '';
  changeCount++;
  renderAll();
}

// ─── INLINE POPOVER (for +N in table) ──────────────
function toggleInlinePopover(rowIdx) {
  inlinePopoverRow = inlinePopoverRow === rowIdx ? null : rowIdx;
  renderMain();

  if (inlinePopoverRow !== null) {
    // Position the popover near the +N counter
    setTimeout(() => {
      const counter = document.querySelector(`tr:nth-child(${rowIdx + 1}) .tag-counter`);
      const popover = document.getElementById('inlineTagPop');
      if (counter && popover) {
        const rect = counter.getBoundingClientRect();
        const main = document.querySelector('.main').getBoundingClientRect();
        popover.style.left = (rect.left - main.left - 8) + 'px';
        popover.style.top = (rect.bottom - main.top + 4) + 'px';
      }
    }, 10);
  }
}

// Add inline popover to the page after main render
const origRenderMain = renderMain;
renderMain = function() {
  origRenderMain();

  // Add inline tag popover if open
  if (inlinePopoverRow !== null) {
    const data = getData();
    const row = data[inlinePopoverRow];
    if (row && row.tags.length > 0) {
      const pop = document.createElement('div');
      pop.id = 'inlineTagPop';
      pop.className = 'tag-popover-inline';
      pop.style.position = 'absolute';
      pop.style.zIndex = '80';
      pop.innerHTML = row.tags.map(t => renderTagBadge(t)).join('');
      document.querySelector('.main').appendChild(pop);

      // Close on outside click
      const closer = (e) => {
        if (!pop.contains(e.target) && !e.target.classList.contains('tag-counter')) {
          inlinePopoverRow = null;
          pop.remove();
          document.removeEventListener('click', closer);
          // Don't re-render, just remove
        }
      };
      setTimeout(() => document.addEventListener('click', closer), 10);
    }
  }
};

// Close actions dropdown on outside click
document.addEventListener('click', (e) => {
  if (actionsOpen && !e.target.closest('.actions-dropdown-anchor')) {
    actionsOpen = false;
    renderMain();
  }
});

// ─── TOAST ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── UNDO TOAST ───────────────────────────────────
function showUndoToast(msg) {
  dismissUndoToast(); // clear any existing
  const el = document.getElementById('undoToast');
  document.getElementById('undoToastMsg').textContent = msg;
  el.classList.add('show');
  undoToastTimer = setTimeout(() => {
    dismissUndoToast();
    undoSnapshot = null; // can't undo after timeout
  }, 6000);
}

function dismissUndoToast() {
  if (undoToastTimer) { clearTimeout(undoToastTimer); undoToastTimer = null; }
  document.getElementById('undoToast').classList.remove('show');
}

function undoTagChange() {
  if (!undoSnapshot) return;
  const data = undoSnapshot.page === 'acct' ? ACCTS : IES;
  undoSnapshot.tagsBefore.forEach((tags, idx) => {
    if (data[idx]) data[idx].tags = [...tags];
  });
  dismissUndoToast();
  undoSnapshot = null;
  changeCount = 0;
  renderMain();
  showToast('Changes undone');
}

              <div style="width:35px; height:20px; background:#7f6df1; border-radius:10px; position:relative; cursor:pointer;"><div style="width:16px; height:16px; background:#fff; border-radius:50%; position:absolute; top:2px; right:2px;"></div></div>
            </div>
          </div>
          <div class="detail-form-row">
            <div class="detail-form-group"><div class="detail-form-label">Bank account country</div><select class="detail-form-select"><option>Australia</option></select></div>
          </div>
          <div class="detail-form-row">
            <div class="detail-form-group"><div class="detail-form-label">Bank account name</div><input class="detail-form-input" value=""></div>

  // Backdrop for detail tag picker
  if (detailTagPickerOpen) {
    html = `<div class="tag-picker-backdrop" onclick="closeDetailTagPicker()" style="z-index:90;"></div>` + html;
  }

  document.getElementById('main-content').innerHTML = html;

  // Focus search if picker open
  if (detailTagPickerOpen) {
    setTimeout(() => { const inp = document.getElementById('tpSearchInput'); if (inp) inp.focus(); }, 30);
  }
}

// ─── RENDER ALL ────────────────────────────────────
function renderAll() {
  renderSidebar();
  if (currentPage === 'detail') {
    renderDetail();
  } else {
    renderMain();
  }
}

// ─── INIT ──────────────────────────────────────────
renderAll();
</script>
